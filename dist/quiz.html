<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/main.css" />
    <title>Quiz Movie</title>
  </head>
  <body class="quiz-page">
    <!-- HEADER / NAV -->
    <header>
      <nav class="container">
        <div class="logo">
          <img src="images/wtf.svg" alt="Movie logo" />
          <span>Movie Kings</span>
        </div>
        <div class="nav"></div>
        <div class="cont-width">
          <a href="index.html" class="btn-stop-quiz" type="button">STOP QUIZ</a>
        </div>
      </nav>
    </header>

    <main>
      <!-- PROGRESS BAR ZONE -->
      <div class="quiz-progress">
        <div class="quiz-progress__inner">
          <div class="quiz-progress__info">
            <span class="quiz-progress__label">QUESTION 1 OF 10</span>
            <span class="quiz-progress__percent">10%</span>
          </div>
          <div class="quiz-progress__bar">
            <div class="quiz-progress__fill"></div>
          </div>
        </div>
      </div>

      <!-- QUIZ CONTENT ZONE -->
      <section class="quiz-pattern">
        <!-- QUIZ CARD -->
        <div class="quiz-card">
          <!-- Quote / Question -->
          <p class="quiz-card__quote">"Here's looking at you, kid."</p>

          <!-- Options -->
          <div class="quiz-card__options">
            <label class="quiz-option" data-correct="true">
              <input type="radio" name="answer" value="casablanca" />
              <span>
                <span class="quiz-option__title">Casablanca</span>
                <span class="quiz-option__director">— Michael Curtiz</span>
                <span class="quiz-option__year">1942</span>
              </span>
            </label>

            <label class="quiz-option">
              <input type="radio" name="answer" value="gone-with-the-wind" />
              <span>
                <span class="quiz-option__title">Gone with the Wind</span>
                <span class="quiz-option__director">— Victor Fleming</span>
                <span class="quiz-option__year">1939</span>
              </span>
            </label>

            <label class="quiz-option">
              <input type="radio" name="answer" value="maltese-falcon" />
              <span>
                <span class="quiz-option__title">The Maltese Falcon</span>
                <span class="quiz-option__director">— John Huston</span>
                <span class="quiz-option__year">1941</span>
              </span>
            </label>

            <label class="quiz-option">
              <input type="radio" name="answer" value="citizen-kane" />
              <span>
                <span class="quiz-option__title">Citizen Kane</span>
                <span class="quiz-option__director">— Orson Welles</span>
                <span class="quiz-option__year">1941</span>
              </span>
            </label>
          </div>

          <!-- Submit -->
          <div class="quiz-card__footer">
            <button class="quiz-card__submit" type="button" disabled>SUBMIT ANSWER</button>
            <button class="quiz-card__next" type="button">NEXT</button>
          </div>
        </div>
      </section>
    </main>
  </body>
  <script src="scripts/script.js"></script>
</html>
